<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0f1e"/>
      <stop offset="100%" stop-color="#0e1929"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="text" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="url(#bg)"/>
  <!-- Gradient ring -->
  <circle cx="32" cy="32" r="29" fill="none" stroke="url(#ring)" stroke-width="2" opacity="0.85"/>
  <!-- Inner subtle ring -->
  <circle cx="32" cy="32" r="25" fill="none" stroke="url(#ring)" stroke-width="0.6" opacity="0.3"/>
  <!-- MH monogram -->
  <text x="32" y="40"
        text-anchor="middle"
        font-family="Trebuchet MS, Arial Black, sans-serif"
        font-size="22"
        font-weight="700"
        letter-spacing="1"
        fill="url(#text)">MH</text>
</svg>

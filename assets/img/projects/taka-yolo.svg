<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#0d2a1a"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#006A4E"/>
      <stop offset="100%" style="stop-color:#F42A41"/>
    </linearGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="18"/></filter>
    <filter id="glow2"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- Background glow blobs -->
  <ellipse cx="200" cy="200" rx="220" ry="160" fill="#006A4E" opacity="0.15" filter="url(#blur)"/>
  <ellipse cx="620" cy="280" rx="200" ry="140" fill="#F42A41" opacity="0.12" filter="url(#blur)"/>
  <!-- Grid lines -->
  <g stroke="#1a4a30" stroke-width="0.5" opacity="0.4">
    <line x1="0" y1="75" x2="800" y2="75"/>
    <line x1="0" y1="150" x2="800" y2="150"/>
    <line x1="0" y1="225" x2="800" y2="225"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="375" x2="800" y2="375"/>
    <line x1="100" y1="0" x2="100" y2="450"/>
    <line x1="200" y1="0" x2="200" y2="450"/>
    <line x1="300" y1="0" x2="300" y2="450"/>
    <line x1="400" y1="0" x2="400" y2="450"/>
    <line x1="500" y1="0" x2="500" y2="450"/>
    <line x1="600" y1="0" x2="600" y2="450"/>
    <line x1="700" y1="0" x2="700" y2="450"/>
  </g>
  <!-- Simulated banknote boxes -->
  <rect x="80" y="130" width="160" height="90" rx="6" fill="none" stroke="#34d399" stroke-width="2" opacity="0.9"/>
  <rect x="83" y="133" width="154" height="84" rx="4" fill="#006A4E" opacity="0.15"/>
  <text x="160" y="183" font-family="monospace" font-size="11" fill="#34d399" text-anchor="middle" opacity="0.95">1000 Tk  0.97</text>
  <rect x="82" y="128" width="158" height="12" rx="3" fill="#34d399" opacity="0.7"/>
  <text x="161" y="138" font-family="monospace" font-size="9" fill="#0a1628" text-anchor="middle" font-weight="bold">100 Taka</text>
  <rect x="290" y="95" width="145" height="85" rx="6" fill="none" stroke="#22d3ee" stroke-width="2" opacity="0.85"/>
  <text x="362" y="143" font-family="monospace" font-size="11" fill="#22d3ee" text-anchor="middle">500 Tk  0.95</text>
  <rect x="292" y="90" width="141" height="12" rx="3" fill="#22d3ee" opacity="0.6"/>
  <text x="362" y="100" font-family="monospace" font-size="9" fill="#0a1628" text-anchor="middle" font-weight="bold">500 Taka</text>
  <rect x="480" y="155" width="155" height="88" rx="6" fill="none" stroke="#fbbf24" stroke-width="2" opacity="0.85"/>
  <text x="557" y="205" font-family="monospace" font-size="11" fill="#fbbf24" text-anchor="middle">50 Tk  0.98</text>
  <rect x="482" y="150" width="151" height="12" rx="3" fill="#fbbf24" opacity="0.6"/>
  <text x="557" y="160" font-family="monospace" font-size="9" fill="#0a1628" text-anchor="middle" font-weight="bold">50 Taka</text>
  <!-- mAP badge -->
  <rect x="560" y="50" width="200" height="55" rx="8" fill="#006A4E" opacity="0.3" stroke="#34d399" stroke-width="1"/>
  <text x="660" y="73" font-family="monospace" font-size="11" fill="#34d399" text-anchor="middle" opacity="0.8">mAP@0.50</text>
  <text x="660" y="95" font-family="monospace" font-size="22" fill="#34d399" text-anchor="middle" font-weight="bold" filter="url(#glow2)">97.16%</text>
  <!-- Title area -->
  <rect x="0" y="330" width="800" height="120" fill="#000" opacity="0.35"/>
  <text x="48" y="375" font-family="'Segoe UI', Arial, sans-serif" font-size="26" fill="#ffffff" font-weight="700" letter-spacing="0.5">🇧🇩 Bangladeshi Taka Detection</text>
  <text x="48" y="402" font-family="monospace" font-size="13" fill="#34d399" letter-spacing="1">YOLOv11 · 11 Classes · 97.16% mAP · Transfer Learning</text>
  <!-- YOLOv11 label -->
  <rect x="48" y="416" width="90" height="22" rx="4" fill="#006A4E" opacity="0.8"/>
  <text x="93" y="431" font-family="monospace" font-size="11" fill="#fff" text-anchor="middle" font-weight="bold">YOLOv11n</text>
  <rect x="148" y="416" width="80" height="22" rx="4" fill="#F42A41" opacity="0.7"/>
  <text x="188" y="431" font-family="monospace" font-size="11" fill="#fff" text-anchor="middle">PyTorch</text>
  <rect x="238" y="416" width="90" height="22" rx="4" fill="#1a3a50" opacity="0.8"/>
  <text x="283" y="431" font-family="monospace" font-size="11" fill="#22d3ee" text-anchor="middle">Roboflow</text>
</svg>

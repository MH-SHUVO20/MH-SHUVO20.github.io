<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0c1a"/>
      <stop offset="100%" style="stop-color:#130810"/>
    </linearGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="20"/></filter>
    <filter id="glow2"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- Background glows -->
  <ellipse cx="180" cy="200" rx="220" ry="160" fill="#0ea5e9" opacity="0.1" filter="url(#blur)"/>
  <ellipse cx="620" cy="220" rx="200" ry="150" fill="#9333ea" opacity="0.12" filter="url(#blur)"/>
  <!-- Grid -->
  <g stroke="#151530" stroke-width="0.5" opacity="0.5">
    <line x1="0" y1="75" x2="800" y2="75"/><line x1="0" y1="150" x2="800" y2="150"/>
    <line x1="0" y1="225" x2="800" y2="225"/><line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="375" x2="800" y2="375"/>
    <line x1="100" y1="0" x2="100" y2="450"/><line x1="200" y1="0" x2="200" y2="450"/>
    <line x1="300" y1="0" x2="300" y2="450"/><line x1="400" y1="0" x2="400" y2="450"/>
    <line x1="500" y1="0" x2="500" y2="450"/><line x1="600" y1="0" x2="600" y2="450"/>
    <line x1="700" y1="0" x2="700" y2="450"/>
  </g>
  <!-- Model pipeline bars -->
  <!-- TF-IDF -->
  <rect x="60" y="90" width="155" height="44" rx="6" fill="#0c4a6e" opacity="0.5" stroke="#0ea5e9" stroke-width="1.5"/>
  <text x="137" y="107" font-family="monospace" font-size="10" fill="#7dd3fc" text-anchor="middle">TF-IDF + LogReg</text>
  <text x="137" y="125" font-family="monospace" font-size="12" fill="#38bdf8" text-anchor="middle" font-weight="bold">High Acc ⚡ Fast</text>
  <!-- Word2Vec -->
  <rect x="60" y="148" width="155" height="44" rx="6" fill="#1e1b4b" opacity="0.5" stroke="#818cf8" stroke-width="1.5"/>
  <text x="137" y="165" font-family="monospace" font-size="10" fill="#a5b4fc" text-anchor="middle">Word2Vec + LogReg</text>
  <text x="137" y="183" font-family="monospace" font-size="12" fill="#818cf8" text-anchor="middle" font-weight="bold">Semantic Embeds</text>
  <!-- BERT Embeddings -->
  <rect x="60" y="206" width="155" height="44" rx="6" fill="#312e81" opacity="0.5" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="137" y="223" font-family="monospace" font-size="10" fill="#c4b5fd" text-anchor="middle">BERT Embeddings</text>
  <text x="137" y="241" font-family="monospace" font-size="12" fill="#a78bfa" text-anchor="middle" font-weight="bold">CLS Token Feats</text>
  <!-- Fine-tuned BERT -->
  <rect x="60" y="264" width="155" height="44" rx="6" fill="#4a1d96" opacity="0.6" stroke="#e879f9" stroke-width="2"/>
  <text x="137" y="281" font-family="monospace" font-size="10" fill="#f0abfc" text-anchor="middle">Fine-tuned BERT ⭐</text>
  <text x="137" y="299" font-family="monospace" font-size="12" fill="#e879f9" text-anchor="middle" font-weight="bold">Best Accuracy</text>
  <!-- Arrow right -->
  <text x="240" y="208" font-family="monospace" font-size="22" fill="#fbbf24" text-anchor="middle" opacity="0.8">→</text>
  <!-- IMDB data representation -->
  <rect x="265" y="80" width="295" height="240" rx="8" fill="#0f0c20" opacity="0.5" stroke="#334155" stroke-width="1"/>
  <text x="412" y="105" font-family="monospace" font-size="11" fill="#94a3b8" text-anchor="middle">IMDB Dataset · 50,000 Reviews</text>
  <!-- Review snippets -->
  <rect x="280" y="115" width="265" height="30" rx="4" fill="#1e293b" opacity="0.7"/>
  <text x="412" y="134" font-family="monospace" font-size="10" fill="#34d399" text-anchor="middle">✅ "Great film! Loved every moment..."</text>
  <rect x="280" y="152" width="265" height="30" rx="4" fill="#1e293b" opacity="0.7"/>
  <text x="412" y="171" font-family="monospace" font-size="10" fill="#f87171" text-anchor="middle">❌ "Boring and predictable, not worth it"</text>
  <rect x="280" y="189" width="265" height="30" rx="4" fill="#1e293b" opacity="0.7"/>
  <text x="412" y="208" font-family="monospace" font-size="10" fill="#34d399" text-anchor="middle">✅ "Outstanding performances throughout"</text>
  <rect x="280" y="226" width="265" height="30" rx="4" fill="#1e293b" opacity="0.7"/>
  <text x="412" y="245" font-family="monospace" font-size="10" fill="#f87171" text-anchor="middle">❌ "Waste of time, terrible direction"</text>
  <!-- Binary labels -->
  <text x="412" y="275" font-family="monospace" font-size="10" fill="#64748b" text-anchor="middle">Positive / Negative · Binary Classification</text>
  <!-- Fine-tuned BERT accuracy badge -->
  <rect x="595" y="90" width="170" height="70" rx="8" fill="#4a1d96" opacity="0.25" stroke="#e879f9" stroke-width="1.5"/>
  <text x="680" y="115" font-family="monospace" font-size="10" fill="#f0abfc" text-anchor="middle">Fine-tuned BERT</text>
  <text x="680" y="135" font-family="monospace" font-size="22" fill="#e879f9" text-anchor="middle" font-weight="bold" filter="url(#glow2)">Best F1</text>
  <text x="680" y="153" font-family="monospace" font-size="10" fill="#c4b5fd" text-anchor="middle">2 Epochs · AdamW 2e-5</text>
  <rect x="595" y="175" width="170" height="60" rx="8" fill="#0c4a6e" opacity="0.25" stroke="#0ea5e9" stroke-width="1"/>
  <text x="680" y="198" font-family="monospace" font-size="10" fill="#7dd3fc" text-anchor="middle">TF-IDF Baseline</text>
  <text x="680" y="218" font-family="monospace" font-size="14" fill="#38bdf8" text-anchor="middle" font-weight="bold">Fast &amp; Strong ⚡</text>
  <text x="680" y="230" font-family="monospace" font-size="9" fill="#64748b" text-anchor="middle">CPU · 2-5 min</text>
  <!-- Title -->
  <rect x="0" y="330" width="800" height="120" fill="#000" opacity="0.4"/>
  <text x="48" y="372" font-family="'Segoe UI', Arial, sans-serif" font-size="25" fill="#ffffff" font-weight="700">🎬 Sentiment Analysis — IMDB Reviews</text>
  <text x="48" y="400" font-family="monospace" font-size="13" fill="#a78bfa" letter-spacing="0.5">TF-IDF · Word2Vec · BERT Embeddings · Fine-tuned BERT</text>
  <rect x="48" y="414" width="85" height="22" rx="4" fill="#1d4ed8" opacity="0.8"/>
  <text x="90" y="429" font-family="monospace" font-size="11" fill="#fff" text-anchor="middle" font-weight="bold">HuggingFace</text>
  <rect x="143" y="414" width="80" height="22" rx="4" fill="#4a1d96" opacity="0.8"/>
  <text x="183" y="429" font-family="monospace" font-size="11" fill="#f0abfc" text-anchor="middle">PyTorch</text>
  <rect x="233" y="414" width="90" height="22" rx="4" fill="#0c4a6e" opacity="0.8"/>
  <text x="278" y="429" font-family="monospace" font-size="11" fill="#38bdf8" text-anchor="middle">Scikit-learn</text>
  <rect x="333" y="414" width="70" height="22" rx="4" fill="#1a2e1a" opacity="0.8"/>
  <text x="368" y="429" font-family="monospace" font-size="11" fill="#34d399" text-anchor="middle">Gensim</text>
</svg>

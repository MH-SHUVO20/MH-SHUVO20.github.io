<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0d1a"/>
      <stop offset="100%" style="stop-color:#0d1128"/>
    </linearGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="20"/></filter>
    <filter id="glow2"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- Background glows -->
  <ellipse cx="150" cy="220" rx="200" ry="160" fill="#4f46e5" opacity="0.15" filter="url(#blur)"/>
  <ellipse cx="650" cy="220" rx="200" ry="160" fill="#7c3aed" opacity="0.12" filter="url(#blur)"/>
  <!-- Grid -->
  <g stroke="#1a1a3a" stroke-width="0.5" opacity="0.5">
    <line x1="0" y1="75" x2="800" y2="75"/><line x1="0" y1="150" x2="800" y2="150"/>
    <line x1="0" y1="225" x2="800" y2="225"/><line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="375" x2="800" y2="375"/>
    <line x1="100" y1="0" x2="100" y2="450"/><line x1="200" y1="0" x2="200" y2="450"/>
    <line x1="300" y1="0" x2="300" y2="450"/><line x1="400" y1="0" x2="400" y2="450"/>
    <line x1="500" y1="0" x2="500" y2="450"/><line x1="600" y1="0" x2="600" y2="450"/>
    <line x1="700" y1="0" x2="700" y2="450"/>
  </g>
  <!-- MLP architecture diagram -->
  <!-- Input layer -->
  <g opacity="0.85">
    <circle cx="120" cy="140" r="10" fill="#4f46e5" stroke="#818cf8" stroke-width="1.5"/>
    <circle cx="120" cy="175" r="10" fill="#4f46e5" stroke="#818cf8" stroke-width="1.5"/>
    <circle cx="120" cy="210" r="10" fill="#4f46e5" stroke="#818cf8" stroke-width="1.5"/>
    <circle cx="120" cy="245" r="10" fill="#4f46e5" stroke="#818cf8" stroke-width="1.5"/>
    <circle cx="120" cy="280" r="10" fill="#4f46e5" stroke="#818cf8" stroke-width="1.5"/>
    <text x="120" y="310" font-family="monospace" font-size="9" fill="#818cf8" text-anchor="middle">3072</text>
    <!-- Hidden 1 -->
    <circle cx="270" cy="130" r="10" fill="#6d28d9" stroke="#a78bfa" stroke-width="1.5"/>
    <circle cx="270" cy="165" r="10" fill="#6d28d9" stroke="#a78bfa" stroke-width="1.5"/>
    <circle cx="270" cy="200" r="10" fill="#6d28d9" stroke="#a78bfa" stroke-width="1.5"/>
    <circle cx="270" cy="235" r="10" fill="#6d28d9" stroke="#a78bfa" stroke-width="1.5"/>
    <circle cx="270" cy="270" r="10" fill="#6d28d9" stroke="#a78bfa" stroke-width="1.5"/>
    <circle cx="270" cy="305" r="10" fill="#6d28d9" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="270" y="325" font-family="monospace" font-size="9" fill="#a78bfa" text-anchor="middle">512</text>
    <!-- Hidden 2 -->
    <circle cx="420" cy="145" r="10" fill="#5b21b6" stroke="#c4b5fd" stroke-width="1.5"/>
    <circle cx="420" cy="185" r="10" fill="#5b21b6" stroke="#c4b5fd" stroke-width="1.5"/>
    <circle cx="420" cy="225" r="10" fill="#5b21b6" stroke="#c4b5fd" stroke-width="1.5"/>
    <circle cx="420" cy="265" r="10" fill="#5b21b6" stroke="#c4b5fd" stroke-width="1.5"/>
    <circle cx="420" cy="305" r="10" fill="#5b21b6" stroke="#c4b5fd" stroke-width="1.5"/>
    <text x="420" y="325" font-family="monospace" font-size="9" fill="#c4b5fd" text-anchor="middle">256</text>
    <!-- Output -->
    <circle cx="580" cy="160" r="12" fill="#7c3aed" stroke="#e879f9" stroke-width="1.5"/>
    <circle cx="580" cy="200" r="12" fill="#7c3aed" stroke="#e879f9" stroke-width="1.5"/>
    <circle cx="580" cy="240" r="12" fill="#7c3aed" stroke="#e879f9" stroke-width="1.5"/>
    <circle cx="580" cy="280" r="12" fill="#7c3aed" stroke="#e879f9" stroke-width="1.5"/>
    <text x="580" y="305" font-family="monospace" font-size="9" fill="#e879f9" text-anchor="middle">10</text>
    <!-- Connection lines (subset) -->
    <g stroke="#818cf8" stroke-width="0.5" opacity="0.2">
      <line x1="130" y1="140" x2="260" y2="130"/><line x1="130" y1="140" x2="260" y2="165"/>
      <line x1="130" y1="140" x2="260" y2="200"/><line x1="130" y1="175" x2="260" y2="130"/>
      <line x1="130" y1="175" x2="260" y2="165"/><line x1="130" y1="210" x2="260" y2="200"/>
      <line x1="130" y1="210" x2="260" y2="235"/><line x1="130" y1="245" x2="260" y2="270"/>
      <line x1="130" y1="280" x2="260" y2="270"/><line x1="130" y1="280" x2="260" y2="305"/>
      <line x1="280" y1="130" x2="410" y2="145"/><line x1="280" y1="165" x2="410" y2="185"/>
      <line x1="280" y1="200" x2="410" y2="225"/><line x1="280" y1="235" x2="410" y2="225"/>
      <line x1="280" y1="270" x2="410" y2="265"/><line x1="280" y1="305" x2="410" y2="305"/>
      <line x1="430" y1="145" x2="568" y2="160"/><line x1="430" y1="185" x2="568" y2="160"/>
      <line x1="430" y1="225" x2="568" y2="200"/><line x1="430" y1="225" x2="568" y2="240"/>
      <line x1="430" y1="265" x2="568" y2="280"/><line x1="430" y1="305" x2="568" y2="280"/>
    </g>
  </g>
  <!-- Accuracy badge -->
  <rect x="630" y="60" width="140" height="60" rx="8" fill="#4f46e5" opacity="0.25" stroke="#818cf8" stroke-width="1"/>
  <text x="700" y="83" font-family="monospace" font-size="11" fill="#a78bfa" text-anchor="middle">Test Accuracy</text>
  <text x="700" y="108" font-family="monospace" font-size="24" fill="#c4b5fd" text-anchor="middle" font-weight="bold" filter="url(#glow2)">48.14%</text>
  <!-- Labels for layers -->
  <text x="120" y="55" font-family="monospace" font-size="10" fill="#818cf8" text-anchor="middle" opacity="0.7">Input</text>
  <text x="270" y="55" font-family="monospace" font-size="10" fill="#a78bfa" text-anchor="middle" opacity="0.7">Dense×4</text>
  <text x="420" y="55" font-family="monospace" font-size="10" fill="#c4b5fd" text-anchor="middle" opacity="0.7">+BatchNorm</text>
  <text x="580" y="55" font-family="monospace" font-size="10" fill="#e879f9" text-anchor="middle" opacity="0.7">Softmax</text>
  <!-- Title area -->
  <rect x="0" y="330" width="800" height="120" fill="#000" opacity="0.4"/>
  <text x="48" y="372" font-family="'Segoe UI', Arial, sans-serif" font-size="26" fill="#ffffff" font-weight="700">🧠 CIFAR-10 Image Classifier</text>
  <text x="48" y="400" font-family="monospace" font-size="13" fill="#a78bfa" letter-spacing="0.5">Dense MLP · Batch Normalization · Dropout · 10-Class</text>
  <rect x="48" y="414" width="100" height="22" rx="4" fill="#4f46e5" opacity="0.8"/>
  <text x="98" y="429" font-family="monospace" font-size="11" fill="#fff" text-anchor="middle" font-weight="bold">TensorFlow</text>
  <rect x="158" y="414" width="70" height="22" rx="4" fill="#6d28d9" opacity="0.8"/>
  <text x="193" y="429" font-family="monospace" font-size="11" fill="#fff" text-anchor="middle">Keras</text>
  <rect x="238" y="414" width="90" height="22" rx="4" fill="#1a1a3a" opacity="0.8"/>
  <text x="283" y="429" font-family="monospace" font-size="11" fill="#c4b5fd" text-anchor="middle">20 Epochs</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0f1a"/>
      <stop offset="100%" style="stop-color:#130a0e"/>
    </linearGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="20"/></filter>
    <filter id="glow2"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- Background glows -->
  <ellipse cx="200" cy="200" rx="220" ry="160" fill="#1a56c4" opacity="0.13" filter="url(#blur)"/>
  <ellipse cx="600" cy="250" rx="200" ry="150" fill="#e11d48" opacity="0.12" filter="url(#blur)"/>
  <!-- Grid -->
  <g stroke="#1a1a2e" stroke-width="0.5" opacity="0.5">
    <line x1="0" y1="75" x2="800" y2="75"/><line x1="0" y1="150" x2="800" y2="150"/>
    <line x1="0" y1="225" x2="800" y2="225"/><line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="375" x2="800" y2="375"/>
    <line x1="100" y1="0" x2="100" y2="450"/><line x1="200" y1="0" x2="200" y2="450"/>
    <line x1="300" y1="0" x2="300" y2="450"/><line x1="400" y1="0" x2="400" y2="450"/>
    <line x1="500" y1="0" x2="500" y2="450"/><line x1="600" y1="0" x2="600" y2="450"/>
    <line x1="700" y1="0" x2="700" y2="450"/>
  </g>
  <!-- VS Battle visual -->
  <!-- NN side (left) -->
  <rect x="55" y="80" width="270" height="220" rx="10" fill="#1a3a6e" opacity="0.2" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="190" y="110" font-family="monospace" font-size="13" fill="#60a5fa" text-anchor="middle" font-weight="bold">Neural Network (NN)</text>
  <!-- NN nodes -->
  <g opacity="0.8">
    <circle cx="120" cy="155" r="8" fill="#1d4ed8" stroke="#60a5fa" stroke-width="1.5"/>
    <circle cx="120" cy="185" r="8" fill="#1d4ed8" stroke="#60a5fa" stroke-width="1.5"/>
    <circle cx="120" cy="215" r="8" fill="#1d4ed8" stroke="#60a5fa" stroke-width="1.5"/>
    <circle cx="120" cy="245" r="8" fill="#1d4ed8" stroke="#60a5fa" stroke-width="1.5"/>
    <circle cx="200" cy="165" r="8" fill="#2563eb" stroke="#93c5fd" stroke-width="1.5"/>
    <circle cx="200" cy="200" r="8" fill="#2563eb" stroke="#93c5fd" stroke-width="1.5"/>
    <circle cx="200" cy="235" r="8" fill="#2563eb" stroke="#93c5fd" stroke-width="1.5"/>
    <circle cx="280" cy="185" r="10" fill="#1e40af" stroke="#bfdbfe" stroke-width="1.5"/>
    <circle cx="280" cy="225" r="10" fill="#1e40af" stroke="#bfdbfe" stroke-width="1.5"/>
    <g stroke="#60a5fa" stroke-width="0.5" opacity="0.3">
      <line x1="128" y1="155" x2="192" y2="165"/><line x1="128" y1="185" x2="192" y2="200"/>
      <line x1="128" y1="215" x2="192" y2="200"/><line x1="128" y1="245" x2="192" y2="235"/>
      <line x1="208" y1="165" x2="270" y2="185"/><line x1="208" y1="200" x2="270" y2="185"/>
      <line x1="208" y1="235" x2="270" y2="225"/>
    </g>
  </g>
  <text x="190" y="275" font-family="monospace" font-size="11" fill="#ef4444" text-anchor="middle">❌ Flattened pixels</text>
  <text x="190" y="292" font-family="monospace" font-size="18" fill="#ef4444" text-anchor="middle" font-weight="bold" filter="url(#glow2)">48.27%</text>
  <!-- VS -->
  <text x="400" y="205" font-family="'Segoe UI', Arial, sans-serif" font-size="32" fill="#fbbf24" text-anchor="middle" font-weight="900" opacity="0.9" filter="url(#glow2)">VS</text>
  <!-- CNN side (right) -->
  <rect x="475" y="80" width="275" height="220" rx="10" fill="#1a3a1a" opacity="0.2" stroke="#34d399" stroke-width="1.5"/>
  <text x="612" y="110" font-family="monospace" font-size="13" fill="#34d399" text-anchor="middle" font-weight="bold">Convolutional CNN</text>
  <!-- Conv layers visual -->
  <g opacity="0.8">
    <rect x="500" y="135" width="36" height="36" rx="3" fill="#065f46" stroke="#34d399" stroke-width="1.5"/>
    <text x="518" y="157" font-family="monospace" font-size="9" fill="#34d399" text-anchor="middle">Conv</text>
    <rect x="548" y="142" width="30" height="30" rx="3" fill="#064e3b" stroke="#6ee7b7" stroke-width="1.5" opacity="0.85"/>
    <text x="563" y="161" font-family="monospace" font-size="9" fill="#6ee7b7" text-anchor="middle">Pool</text>
    <rect x="590" y="135" width="36" height="36" rx="3" fill="#065f46" stroke="#34d399" stroke-width="1.5"/>
    <text x="608" y="157" font-family="monospace" font-size="9" fill="#34d399" text-anchor="middle">Conv</text>
    <rect x="638" y="142" width="30" height="30" rx="3" fill="#064e3b" stroke="#6ee7b7" stroke-width="1.5" opacity="0.85"/>
    <text x="653" y="161" font-family="monospace" font-size="9" fill="#6ee7b7" text-anchor="middle">Pool</text>
    <rect x="680" y="135" width="36" height="36" rx="3" fill="#065f46" stroke="#34d399" stroke-width="1.5"/>
    <text x="698" y="157" font-family="monospace" font-size="9" fill="#34d399" text-anchor="middle">Conv</text>
    <g stroke="#34d399" stroke-width="0.8" opacity="0.5">
      <line x1="536" y1="153" x2="548" y2="157"/><line x1="578" y1="157" x2="590" y2="153"/>
      <line x1="626" y1="157" x2="638" y2="157"/><line x1="668" y1="157" x2="680" y2="153"/>
    </g>
    <rect x="570" y="185" width="85" height="28" rx="4" fill="#047857" opacity="0.3" stroke="#34d399" stroke-width="1"/>
    <text x="612" y="203" font-family="monospace" font-size="10" fill="#34d399" text-anchor="middle">Dense(180) → 10</text>
  </g>
  <text x="612" y="240" font-family="monospace" font-size="11" fill="#34d399" text-anchor="middle">✅ Spatial features</text>
  <text x="612" y="258" font-family="monospace" font-size="18" fill="#34d399" text-anchor="middle" font-weight="bold" filter="url(#glow2)">69.12%</text>
  <!-- Gap indicator -->
  <rect x="300" y="290" width="200" height="28" rx="6" fill="#fbbf24" opacity="0.15" stroke="#fbbf24" stroke-width="1"/>
  <text x="400" y="308" font-family="monospace" font-size="12" fill="#fbbf24" text-anchor="middle" font-weight="bold">+20.85 pp CNN advantage</text>
  <!-- Title -->
  <rect x="0" y="330" width="800" height="120" fill="#000" opacity="0.4"/>
  <text x="48" y="372" font-family="'Segoe UI', Arial, sans-serif" font-size="26" fill="#ffffff" font-weight="700">⚔️ NN vs CNN — CIFAR-10 Battle</text>
  <text x="48" y="400" font-family="monospace" font-size="13" fill="#fbbf24" letter-spacing="0.5">Comparative Study · 15 Epochs · 60K Images · 10 Classes</text>
  <rect x="48" y="414" width="100" height="22" rx="4" fill="#1d4ed8" opacity="0.8"/>
  <text x="98" y="429" font-family="monospace" font-size="11" fill="#fff" text-anchor="middle" font-weight="bold">TensorFlow</text>
  <rect x="158" y="414" width="70" height="22" rx="4" fill="#065f46" opacity="0.8"/>
  <text x="193" y="429" font-family="monospace" font-size="11" fill="#34d399" text-anchor="middle">Keras</text>
  <rect x="238" y="414" width="90" height="22" rx="4" fill="#1a1a2e" opacity="0.8"/>
  <text x="283" y="429" font-family="monospace" font-size="11" fill="#fbbf24" text-anchor="middle">Python 3.12</text>
</svg>
